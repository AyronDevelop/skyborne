<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Skyborne — by Sony Interactive Entertainment</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #0b0e1a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }
  #fps {
    position: fixed;
    top: 8px; right: 12px;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    font-family: monospace;
    pointer-events: none;
    z-index: 10;
    letter-spacing: 0.5px;
  }
  #brand {
    position: fixed;
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.12);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 10;
    font-weight: 300;
  }
  @media (max-width: 600px) {
    #fps { display: none; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fps">-- FPS</div>
<div id="brand">Skyborne · Sony Interactive Entertainment</div>
<script>
// S K Y B O R N E
// A Sony Interactive Entertainment Production
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const fpsEl = document.getElementById('fps');
let W, H, GAME_W = 420, GAME_H, scale;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  GAME_H = H;
  scale = Math.min(W / GAME_W, 1.2);
}
resize();
window.addEventListener('resize', resize);
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
console.log('Skyborne loaded');
</script>
</body>
</html>
